<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Classroom Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard-page">
    <header class="dashboard-header">
        <div class="header-left">
            <h1>🎓 Smart Classroom Monitor</h1>
            <div class="status-indicator">
                <span class="status-dot live"></span>
                <span>Live Monitoring</span>
            </div>
        </div>
        <div class="header-right">
            <span class="username">Welcome, {{ session.username }}</span>
            <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
        </div>
    </header>

    <main class="dashboard-content">
        <!-- Video Feed Section -->
        <section class="video-section">
            <div class="video-container">
                <img src="{{ url_for('video_feed') }}" alt="Live Video Feed" class="video-feed">
            </div>
        </section>

        <!-- Controls Section -->
        <aside class="controls-section">
            <!-- Mode Switcher -->
            <div class="card mode-switcher">
                <h2>Mode Selection</h2>
                <div class="mode-buttons">
                    <button class="mode-btn lecture active" onclick="setMode('LECTURE')" id="lectureBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 3L1 9L12 15L21 10.09V17H23V9M5 13.18V17.18L12 21L19 17.18V13.18L12 17L5 13.18Z"
                                fill="currentColor" />
                        </svg>
                        <span>Lecture Mode</span>
                    </button>
                    <button class="mode-btn exam" onclick="setMode('EXAM')" id="examBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM18 20H6V4H13V9H18V20ZM9 13V19H7V13H9ZM15 15V19H17V15H15ZM11 11V19H13V11H11Z"
                                fill="currentColor" />
                        </svg>
                        <span>Exam Mode</span>
                    </button>
                </div>
            </div>

            <!-- Stats Panel -->
            <div class="card stats-panel">
                <h2>Live Statistics</h2>

                <div class="stat-item engagement">
                    <div class="stat-header">
                        <span class="stat-label">Engagement Score</span>
                        <span class="stat-value" id="engagementScore">100</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="engagementBar" style="width: 100%"></div>
                    </div>
                </div>

                <div class="stat-item students">
                    <div class="stat-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M16 11C17.66 11 18.99 9.66 18.99 8C18.99 6.34 17.66 5 16 5C14.34 5 13 6.34 13 8C13 9.66 14.34 11 16 11ZM8 11C9.66 11 10.99 9.66 10.99 8C10.99 6.34 9.66 5 8 5C6.34 5 5 6.34 5 8C5 9.66 6.34 11 8 11ZM8 13C5.67 13 1 14.17 1 16.5V19H15V16.5C15 14.17 10.33 13 8 13ZM16 13C15.71 13 15.38 13.02 15.03 13.05C16.19 13.89 17 15.02 17 16.5V19H23V16.5C23 14.17 18.33 13 16 13Z"
                                fill="currentColor" />
                        </svg>
                    </div>
                    <div class="stat-content">
                        <span class="stat-label">Students Present</span>
                        <span class="stat-number" id="studentCount">0</span>
                    </div>
                </div>

                <div class="stat-item mode-display">
                    <div class="stat-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z"
                                fill="currentColor" />
                        </svg>
                    </div>
                    <div class="stat-content">
                        <span class="stat-label">Current Mode</span>
                        <span class="stat-badge" id="currentMode">LECTURE</span>
                    </div>
                </div>
            </div>

            <!-- Alerts Log -->
            <div class="card alerts-panel">
                <h2>Recent Alerts</h2>
                <div class="alerts-list" id="alertsList">
                    <div class="no-alerts">No alerts yet</div>
                </div>
            </div>

            <!-- Actions -->
            <div class="card actions-panel">
                <h2>Actions</h2>
                <button class="action-btn attendance" onclick="logAttendance()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19 3H14.82C14.4 1.84 13.3 1 12 1C10.7 1 9.6 1.84 9.18 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM12 3C12.55 3 13 3.45 13 4C13 4.55 12.55 5 12 5C11.45 5 11 4.55 11 4C11 3.45 11.45 3 12 3ZM10 17L6 13L7.41 11.59L10 14.17L16.59 7.58L18 9L10 17Z"
                            fill="currentColor" />
                    </svg>
                    <span>Log Attendance</span>
                </button>
            </div>
        </aside>
    </main>

    <script>
        let eventSource = null;

        // Initialize SSE connection
        function initMetricsStream() {
            eventSource = new EventSource('{{ url_for("metrics_feed") }}');

            eventSource.onmessage = function (event) {
                const data = JSON.parse(event.data);
                updateDashboard(data);
            };

            eventSource.onerror = function (error) {
                console.error('SSE Error:', error);
                // Attempt to reconnect after 3 seconds
                setTimeout(() => {
                    if (eventSource.readyState === EventSource.CLOSED) {
                        initMetricsStream();
                    }
                }, 3000);
            };
        }

        // Update dashboard elements
        function updateDashboard(data) {
            // Update student count
            document.getElementById('studentCount').textContent = data.studentCount;

            // Update engagement score
            const engagement = Math.round(data.engagement);
            document.getElementById('engagementScore').textContent = engagement;

            // Update progress bar
            const progressBar = document.getElementById('engagementBar');
            progressBar.style.width = engagement + '%';

            // Change color based on engagement level
            if (engagement > 70) {
                progressBar.className = 'progress-fill high';
            } else if (engagement > 40) {
                progressBar.className = 'progress-fill medium';
            } else {
                progressBar.className = 'progress-fill low';
            }

            // Update mode display
            document.getElementById('currentMode').textContent = data.mode;

            // Update alerts
            const alertsList = document.getElementById('alertsList');
            if (data.alerts && data.alerts.length > 0) {
                alertsList.innerHTML = data.alerts.map(alert =>
                    `<div class="alert-item">${alert}</div>`
                ).join('');
            } else {
                alertsList.innerHTML = '<div class="no-alerts">No alerts yet</div>';
            }
        }

        // Set mode
        function setMode(mode) {
            fetch(`/set_mode/${mode}`, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Update UI
                        const lectureBtn = document.getElementById('lectureBtn');
                        const examBtn = document.getElementById('examBtn');

                        if (mode === 'LECTURE') {
                            lectureBtn.classList.add('active');
                            examBtn.classList.remove('active');
                        } else {
                            examBtn.classList.add('active');
                            lectureBtn.classList.remove('active');
                        }

                        showNotification(`Switched to ${mode} mode`, 'success');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showNotification('Failed to switch mode', 'error');
                });
        }

        // Log attendance
        function logAttendance() {
            fetch('/log_attendance', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showNotification(`Attendance logged: ${data.count} students`, 'success');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showNotification('Failed to log attendance', 'error');
                });
        }

        // Show notification
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.classList.add('show');
            }, 10);

            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function () {
            initMetricsStream();
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', function () {
            if (eventSource) {
                eventSource.close();
            }
        });
    </script>
</body>

</html>
